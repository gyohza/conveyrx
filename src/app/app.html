<div class="flex h-dvh flex-col overflow-hidden bg-[#0d0d16] text-slate-100">
  <app-top-bar />
  <main class="flex min-h-0 flex-1 flex-col-reverse landscape:flex-row">
    <app-toolbar />
    <div class="flex min-h-0 min-w-0 flex-1 flex-col">
      <app-status-strip />
      <app-game-canvas class="block h-full w-full min-h-0" />
    </div>
    @if (ui.rxSidebarOpen()) {
      <app-rx-sidebar />
    }
  </main>
</div>
@if (ui.helpOpen()) {
  <app-help-dialog />
}
